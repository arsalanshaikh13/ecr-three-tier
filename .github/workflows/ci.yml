name: Build, Push, and Deploy to ECS

on:
  push:
    branches:
      - main
    paths:
      - "host-based/**"
      - ".github/workflows/**" # Triggers if you update this pipeline file
  workflow_dispatch: # Allows you to trigger deployments/secret rotations manually via the GitHub UI
    inputs:
      skip_build:
        description: "Skip Docker Build & Push?"
        type: boolean
        required: true
        default: true

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: ecs-cluster-dev
  ECS_TASK_DEFINITION: task-definition.json

# REQUIRED FOR OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: "authors"
            port: 3300
            env: "[]"
          - service: "books"
            port: 3400
            env: "[]"
          - service: "dashboard"
            port: 3200
            env: '[{"name": "BOOKS_SERVICE_URL", "value": "https://books.${{ vars.DOMAIN_NAME }}"}, {"name": "AUTHORS_SERVICE_URL", "value": "https://authors.${{ vars.DOMAIN_NAME }}"}]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------------------------------------
      # BUILD & DEPLOY
      # ---------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        id: build-image
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_build == true) }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          REPO_NAME: ${{ matrix.service }}-repo-${{vars.ENV_VAR}}
        run: |
          cd host-based
          # Assumes Dockerfiles are in folders named 'authors', 'books', 'dashboard'
          docker build -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG ./${{ matrix.service }}
          docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Determine Image URI (Fetch from ECR)
        id: determine-image
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.skip_build == true) }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO_NAME: ${{ matrix.service }}-repo-${{vars.ENV_VAR}}
        run: |
          # 1. If the user left the input as 'latest', dynamically fetch the most recent tag from ECR
          echo "🔍 Fetching the most recently pushed image tag from ECR for $REPO_NAME..."

          # AWS CLI command to get the latest pushed image tag
          FETCHED_TAG=$(aws ecr describe-images \
            --repository-name $REPO_NAME \
            --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
            --output text)

          # Safety check: ensure we actually found a tag
          if [ "$FETCHED_TAG" == "None" ] || [ -z "$FETCHED_TAG" ]; then
            echo "❌ Error: Could not find any images in ECR repository $REPO_NAME"
            exit 1
          fi

          echo "✅ Found latest image tag: $FETCHED_TAG"
          echo "final_image=$ECR_REGISTRY/$REPO_NAME:$FETCHED_TAG" >> $GITHUB_OUTPUT

      #   - name: Inject Variables into JSON
      #     env:
      #       SERVICE_NAME: ${{ matrix.service }}
      #       APP_PORT: ${{ matrix.port }}
      #       ENVIRONMENT_VARS: ${{ matrix.env }}
      #       ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
      #       APP_CPU: ${{ vars.APP_CPU }}
      #       APP_MEMORY: ${{ vars.APP_MEMORY }}
      #     run: |
      #       # envsubst fills in the ports and the JSON array for environment variables
      #       envsubst < ${{ env.ECS_TASK_DEFINITION }}.template > ${{ env.ECS_TASK_DEFINITION }}

      - name: Download current ECS task definition
        run: |
          # Fetches the active task definition from AWS and saves it to a temporary JSON file
          aws ecs describe-task-definition \
            --task-definition lirw-task-${{ matrix.service }} \
            --query taskDefinition > ${{ env.ECS_TASK_DEFINITION }}

      - name: Fill in the new image ID
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: lirw-${{ matrix.service }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ matrix.service }}-service-${{ vars.ENV_VAR }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
