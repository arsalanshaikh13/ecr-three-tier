name: Build, Push, and Deploy to ECS

on:
  push:
    branches:
      - main
      - fargate
    paths:
      - "rusinnextjs/**"
      - ".github/workflows/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rusin-nextjs-app-repo-dev
  ECS_SERVICE: nextjs-app-service
  ECS_CLUSTER: ecs-cluster-dev
  ECS_TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: nextjs_task_manager_app
  DOMAIN_NAME: devsandbox.space

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------------------------------------
      # NEW STEP: Fetch Secrets securely
      # ---------------------------------------------------------
      #   - name: Fetch MongoDB URI from Secrets Manager
      #     id: fetch-secrets
      #     run: |
      #       # Fetch the secret string from AWS
      #       MONGO_URI=$(aws secretsmanager get-secret-value --secret-id /nextjs-task-manager/prod/mongodb-uri --query SecretString --output text)

      #       # CRITICAL: Mask the secret so it never prints in GitHub Action logs
      #       echo "::add-mask::$MONGO_URI"

      #       # Pass it as an output to the next step
      #       echo "MONGO_URI=$MONGO_URI" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # FIXED: Consolidated Build & Push
      # ---------------------------------------------------------
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd rusinnextjs

          # Pass the dummy URI so the build bypasses the database connection
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://${{ env.DOMAIN_NAME }} \
            --build-arg MONGODB_URI=mongodb://build-time-dummy \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
            
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # FIXED: Correct Task Definition Fetch
      # ---------------------------------------------------------
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition nextjs-task-manager-app \
            --query taskDefinition > ${{ env.ECS_TASK_DEFINITION }}

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
