<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authors App</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="/authors-style.css" />
  </head>

  <body>
    <h1 class="title">⚡ ECS - Advanced ALB Routing</h1>
    <h2 class="sub-title">Authors</h2>

    <div class="container">
      <table id="authorsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Birth Date</th>
            <th>Bio</th>
          </tr>
        </thead>
        <tbody id="authorsTableBody"></tbody>
      </table>

      <div id="loading">Loading...</div>

      <div id="errorUI">Error loading authors. Please try again later.</div>
    </div>

    <script>
      // Utility function to prevent XSS when using innerHTML
      function escapeHTML(str) {
        if (!str) return "";
        return str
          .toString()
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function fetchAuthors() {
        const loadingDiv = document.getElementById("loading");
        const errorUI = document.getElementById("errorUI");
        const table = document.getElementById("authorsTable");

        try {
          loadingDiv.style.display = "block";
          errorUI.style.display = "none";
          table.style.display = "none";

          const res = await fetch("/authors/api");
          if (!res.ok) throw new Error("Network response was not ok");
          const { authors } = await res.json();

          const tbody = document.getElementById("authorsTableBody");
          tbody.innerHTML = ""; // Clear existing rows

          authors.forEach((author) => {
            const row = document.createElement("tr");

            // Safely inject data using template literals and escapeHTML
            row.innerHTML = `
              <td>${escapeHTML(author.name)}</td>
              <td style="min-width: 120px;">${escapeHTML(author.birthDate || author.dob || "Unknown")}</td>
              <td>${escapeHTML(author.bio)}</td>
            `;

            tbody.appendChild(row);
          });

          loadingDiv.style.display = "none";
          table.style.display = "table";
        } catch (err) {
          console.error("Error fetching authors:", err);
          loadingDiv.style.display = "none";
          errorUI.style.display = "block";
        }
      }

      window.onload = fetchAuthors;
    </script>
  </body>
</html>
