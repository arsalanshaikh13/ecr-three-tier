<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authors App</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="/authors-style.css" />
  </head>

  <body>
    <h1 class="title">⚡ ECS - Advanced ALB Routing</h1>
    <h2 class="sub-title">Authors</h2>

    <div class="container">
      <table id="authorsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Birth Date</th>
            <th>Bio</th>
          </tr>
        </thead>
        <tbody id="authorsTableBody"></tbody>
      </table>

      <div id="loading">Loading...</div>

      <div id="errorUI">Error loading authors. Please try again later.</div>
    </div>

    <script>
      async function fetchAuthors() {
        try {
          const loadingDiv = document.getElementById("loading");
          loadingDiv.style.display = "block";

          const res = await fetch("/authors/api");
          const { authors } = await res.json();

          loadingDiv.style.display = "none";

          const tbody = document.getElementById("authorsTableBody");

          authors.forEach((author) => {
            const row = document.createElement("tr");

            const nameCell = document.createElement("td");
            nameCell.textContent = author.name;

            const birthCell = document.createElement("td");
            birthCell.textContent = author.birthDate || author.dob || "Unknown";
            birthCell.style.minWidth = "120px";

            const bioCell = document.createElement("td");
            bioCell.textContent = author.bio;

            row.appendChild(nameCell);
            row.appendChild(birthCell);
            row.appendChild(bioCell);
            tbody.appendChild(row);
          });

          document.getElementById("authorsTable").style.display = "table";
          document.getElementById("errorUI").style.display = "none";
        } catch (err) {
          console.error("Error fetching authors:", err);
          document.getElementById("loading").style.display = "none";
          document.getElementById("authorsTable").style.display = "none";
          document.getElementById("errorUI").style.display = "block";
        }
      }

      window.onload = fetchAuthors;
    </script>
  </body>
</html>
