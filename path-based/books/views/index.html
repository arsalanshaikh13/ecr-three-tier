<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books App</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="/books-style.css" />
  </head>

  <body>
    <h1 class="title">⚡ ECS - Advanced ALB Routing</h1>
    <h2 class="sub-title">Books</h2>

    <div class="container">
      <table id="booksTable">
        <thead>
          <tr>
            <th>Title</th>
            <th>Published Date</th>
            <th>Pages</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody id="booksTableBody"></tbody>
      </table>

      <div id="loading">Loading...</div>

      <div id="errorUI">Error loading books. Please try again later.</div>
    </div>

    <script>
      // Utility function to prevent XSS
      function escapeHTML(str) {
        if (!str) return "";
        return str
          .toString()
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function fetchBooks() {
        const loadingDiv = document.getElementById("loading");
        const errorUI = document.getElementById("errorUI");
        const table = document.getElementById("booksTable");

        try {
          loadingDiv.style.display = "block";
          errorUI.style.display = "none";
          table.style.display = "none";

          const res = await fetch("/books/api");
          if (!res.ok) throw new Error("Network response was not ok");
          const { books } = await res.json();

          const tbody = document.getElementById("booksTableBody");
          tbody.innerHTML = ""; // Clear existing rows

          books.forEach((book) => {
            const row = document.createElement("tr");

            // Safely inject data using template literals
            row.innerHTML = `
              <td>${escapeHTML(book.title)}</td>
              <td style="min-width: 120px;">${escapeHTML(book.publishedDate)}</td>
              <td>${escapeHTML(book.pages)}</td>
              <td>${escapeHTML(book.description)}</td>
            `;

            tbody.appendChild(row);
          });

          loadingDiv.style.display = "none";
          table.style.display = "table";
        } catch (err) {
          console.error("Error fetching books:", err);
          loadingDiv.style.display = "none";
          errorUI.style.display = "block";
        }
      }

      window.onload = fetchBooks;
    </script>
  </body>
</html>
