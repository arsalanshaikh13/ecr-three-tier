<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard App</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <h1 class="title">⚡ ECS - Advanced ALB Routing</h1>
    <h2 class="sub-title">Dashboard</h2>

    <div class="container">
      <table id="dashboardTable">
        <thead>
          <tr>
            <th>Book Title</th>
            <th>Author</th>
            <th>Published Date</th>
            <th>Pages</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="dashboardTableBody"></tbody>
      </table>

      <div id="loading">Loading...</div>

      <div id="errorUI">Error loading data. Please try again later.</div>
    </div>

    <div id="drawer" class="drawer">
      <div class="drawer-header">
        <button class="close-icon">&times;</button>
      </div>
      <div class="drawer-body"></div>
      <div class="drawer-footer">
        <button id="closeDrawer">Close</button>
      </div>
    </div>
    <script>
      // Utility function to prevent XSS when injecting text
      function escapeHTML(str) {
        if (!str) return "";
        return str
          .toString()
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function fetchData() {
        const loadingDiv = document.getElementById("loading");
        const errorUI = document.getElementById("errorUI");
        const table = document.getElementById("dashboardTable");

        try {
          loadingDiv.style.display = "block";
          errorUI.style.display = "none";
          table.style.display = "none";

          // Fetch config from server
          const configRes = await fetch("/config");
          if (!configRes.ok) throw new Error("Failed to load configuration");
          const config = await configRes.json();

          const { BOOKS_SERVICE_URL, AUTHORS_SERVICE_URL } = config;

          // Fetch books and authors IN PARALLEL for better performance
          const [booksRes, authorsRes] = await Promise.all([
            fetch(`${BOOKS_SERVICE_URL}/api`),
            fetch(`${AUTHORS_SERVICE_URL}/api`),
          ]);

          if (!booksRes.ok || !authorsRes.ok)
            throw new Error("Failed to fetch data from microservices");

          const { books } = await booksRes.json();
          const { authors } = await authorsRes.json();

          // Create a map of authors for quick lookup
          const authorsMap = new Map();
          authors.forEach((author) => authorsMap.set(author.id, author));

          const tbody = document.getElementById("dashboardTableBody");
          tbody.innerHTML = ""; // Clear existing rows if any

          books.forEach((book) => {
            const author = authorsMap.get(book.authorId);
            const row = document.createElement("tr");

            // Using textContent naturally prevents XSS
            row.innerHTML = `
            <td>${escapeHTML(book.title)}</td>
            <td>${escapeHTML(author ? author.name : "Unknown")}</td>
            <td>${escapeHTML(book.publishedDate)}</td>
            <td>${escapeHTML(book.pages)}</td>
            <td><button class="action-button">View</button></td>
          `;

            // Attach event listener
            const actionButton = row.querySelector(".action-button");
            actionButton.addEventListener("click", () => {
              const drawer = document.getElementById("drawer");
              const drawerContent = document.querySelector(".drawer-body");

              // Safely inject data using our escape function
              drawerContent.innerHTML = `
              <h2>📘 ${escapeHTML(book.title)}</h2>
              <p><strong>Author:</strong> ${escapeHTML(author ? author.name : "Unknown")}</p>
              <p><strong>Published Date:</strong> ${escapeHTML(book.publishedDate)}</p>
              <p><strong>Pages:</strong> ${escapeHTML(book.pages)}</p>
              <p><strong>Book Description:</strong> ${escapeHTML(book.description || "N/A")}</p>
              <p><strong>Author Bio:</strong> ${escapeHTML(author ? author.bio : "N/A")}</p>
              <p><strong>Author Birthday:</strong> ${escapeHTML(author ? author.birthDate : "N/A")}</p>
            `;
              drawer.classList.add("open");
            });

            tbody.appendChild(row);
          });

          loadingDiv.style.display = "none";
          table.style.display = "table";
        } catch (err) {
          console.error("Error fetching data:", err);
          loadingDiv.style.display = "none";
          errorUI.style.display = "block";
        }
      }

      window.onload = fetchData;

      // Consolidate drawer closing logic
      const closeDrawer = () =>
        document.getElementById("drawer").classList.remove("open");
      document
        .querySelector(".close-icon")
        .addEventListener("click", closeDrawer);
      document
        .getElementById("closeDrawer")
        .addEventListener("click", closeDrawer);
    </script>
  </body>
</html>
