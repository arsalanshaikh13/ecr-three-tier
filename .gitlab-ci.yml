stages:
  - detect
  - build-and-deploy
  - seed

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"' # Manual trigger via UI
    - if: '$CI_COMMIT_BRANCH == "gitlab-public"'
      changes:
        - lirw-three-tier/**/*
        - .gitlab-ci.yml

variables:
  AWS_REGION: "us-east-1"
  ECS_CLUSTER: "ecs-cluster-$ENV_VAR"
  ECR_REGISTRY: "$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

  # Pipeline UI interactive variables (defaults)
  GET_BACKEND:
    value: "false"
    description: "Set to 'true' to get backend image from ecr & Push"
  GET_FRONTEND:
    value: "false"
    description: "Set to 'true' to get frontend image from ecr & Push"
  BUILD_BACKEND:
    value: "false"
    description: "Set to 'true' to build backend image from ecr & Push"
  BUILD_FRONTEND:
    value: "false"
    description: "Set to 'true' to build frontend image from ecr & Push"
  SEED_DATABASE:
    value: "false"
    description: "Set to 'true' to seed Database from ci cd pipeline"

# ---------------------------------------------------------
# GLOBAL CONFIGURATION
# ---------------------------------------------------------
default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com

# ---------------------------------------------------------
# HIDDEN HELPER: OIDC AUTHENTICATION
# ---------------------------------------------------------
.aws_oidc_login:
  script:
    - >
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn arn:aws:iam::${ACCOUNT_ID}:role/GitLabActions-ECS-DeployRole
      --role-session-name "GitLabRunner-${CI_PIPELINE_ID}"
      --web-identity-token ${GITLAB_OIDC_TOKEN}
      --duration-seconds 3600
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
      --output text))

# ---------------------------------------------------------
# REUSABLE SCRIPT "FUNCTIONS"
# ---------------------------------------------------------
.setup_cli:
  script:
    - apk add --no-cache aws-cli jq

.resolve_image:
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - |
      if [ "$SHOULD_BUILD" == "true" ]; then
        echo "Building image for $ECR_REPOSITORY..."
        cd $BUILD_DIR
        docker build -f $DOCKERFILE_NAME -t $ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_SHA -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_SHA
        FINAL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_SHA"
        cd $CI_PROJECT_DIR # Return to root
      else
        echo "Fetching latest image for $ECR_REPOSITORY..."
        FETCHED_TAG=$(aws ecr describe-images --repository-name $ECR_REPOSITORY --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' --output text)
        if [ "$FETCHED_TAG" == "None" ] || [ -z "$FETCHED_TAG" ]; then echo "❌ No image found." && exit 1; fi
        FINAL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$FETCHED_TAG"
      fi
      echo "✅ Using Image: $FINAL_IMAGE"

.update_task_def:
  script:
    - echo "Updating Task Definition: $TASK_FAMILY..."
    - TASK_DEF_JSON=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
    - NEW_DEF=$(echo "$TASK_DEF_JSON" | jq --arg IMAGE "$FINAL_IMAGE" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities)')
    - NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)

# ---------------------------------------------------------
# 1. DETECT CHANGES
# ---------------------------------------------------------
detect-changes:
  stage: detect
  image: alpine:latest
  rules:
    # 1. If it's a manual UI trigger, DO NOT run this job at all.
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never
  script:
    - apk add --no-cache git
    - touch build.env # Prevents artifact crash if nothing matches
    - git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA > changed_files.txt
    - |
      # Write dynamically detected changes to build.env to override the default "false" variables
      if grep -q "lirw-three-tier/frontend/" changed_files.txt; then echo "BUILD_FRONTEND=true" >> build.env; fi
      if grep -q "lirw-three-tier/backend/" changed_files.txt; then echo "BUILD_BACKEND=true" >> build.env; fi
      if grep -q "lirw-three-tier/database-seeder/" changed_files.txt; then echo "SEED_DATABASE=true" >> build.env; fi
  artifacts:
    reports:
      dotenv: build.env

# ---------------------------------------------------------
# 2. BUILD & DEPLOY JOBS
# ---------------------------------------------------------
.deploy_template:
  stage: build-and-deploy
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - !reference [.setup_cli, script]
    - !reference [.aws_oidc_login, script]
    - !reference [.resolve_image, script]
    - !reference [.update_task_def, script]
  script:
    - aws ecs update-service --cluster $ECS_CLUSTER --service $SERVICE_NAME --task-definition $NEW_TASK_ARN --force-new-deployment
    - aws ecs wait services-stable --cluster $ECS_CLUSTER --services $SERVICE_NAME

deploy-frontend:
  extends: .deploy_template
  needs:
    - job: detect-changes
      artifacts: true
  variables:
    SHOULD_BUILD: $BUILD_FRONTEND
    BUILD_DIR: "lirw-three-tier/frontend"
    DOCKERFILE_NAME: "Dockerfile"
    ECR_REPOSITORY: "lirw-ecr-frontend-repo-$ENV_VAR"
    TASK_FAMILY: "lirw-ecr-frontend"
    SERVICE_NAME: "frontend-service"
  rules:
    - if: '$BUILD_FRONTEND == "true" || $GET_FRONTEND == "true"'

deploy-backend:
  extends: .deploy_template
  needs:
    - job: detect-changes
      artifacts: true
  variables:
    SHOULD_BUILD: $BUILD_BACKEND
    BUILD_DIR: "lirw-three-tier/backend"
    DOCKERFILE_NAME: "Dockerfile"
    ECR_REPOSITORY: "lirw-ecr-backend-repo-$ENV_VAR"
    TASK_FAMILY: "lirw-ecr-backend"
    SERVICE_NAME: "backend-service"
  rules:
    - if: '$BUILD_BACKEND == "true" || $GET_BACKEND == "true"'

# ---------------------------------------------------------
# 3. DB SEEDING
# ---------------------------------------------------------
seed-database:
  stage: seed
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  needs:
    - job: detect-changes
      artifacts: true
  rules:
    - if: '$SEED_DATABASE == "true"'
  variables:
    SHOULD_BUILD: "true"
    BUILD_DIR: "lirw-three-tier/database-seeder"
    DOCKERFILE_NAME: "db.Dockerfile"
    ECR_REPOSITORY: "lirw-ecr-database-seed-repo-$ENV_VAR"
    TASK_FAMILY: "db-seeder-$ENV_VAR"
  before_script:
    - !reference [.setup_cli, script]
    - !reference [.aws_oidc_login, script]
    - !reference [.resolve_image, script]
    - !reference [.update_task_def, script]
  script:
    - SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=ecs-node-backend-sg-$ENV_VAR" --query "SecurityGroups[0].GroupId" --output text)
    - SUBNETS=$(aws ec2 describe-subnets --filters "Name=tag:Name,Values=pri-sub-*" --query 'Subnets[*].SubnetId' --output json | tr -d '\n' | tr -d ' ')
    - echo "Starting DB Seeding Task..."
    - TASK_ARN=$(aws ecs run-task --cluster $ECS_CLUSTER --task-definition $NEW_TASK_ARN --launch-type FARGATE --network-configuration "awsvpcConfiguration={subnets=$SUBNETS,securityGroups=[$SG_ID]}" --query "tasks[0].taskArn" --output text)
    - aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks $TASK_ARN
    - EXIT_CODE=$(aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $TASK_ARN --query "tasks[0].containers[0].exitCode" --output text)
    - |
      if [ "$EXIT_CODE" -eq "0" ]; then echo "✅ Seeding Success"; else echo "❌ Seeding Failed" && exit 1; fi
