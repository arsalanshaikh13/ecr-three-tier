stages:
  - build
  - prepare
  - deploy

# ---------------------------------------------------------
# PIPELINE TRIGGER RULES
# ---------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"' # Manual trigger via UI
    - if: '$CI_COMMIT_BRANCH == "gitlab-public"'
      changes:
        - "lirw-three-tier/**/*"
        - ".gitlab-ci.yml"

variables:
  AWS_REGION: "us-east-1"
  ECS_CLUSTER: "ecs-cluster-$ENV_VAR"

  # Pipeline UI interactive variables (defaults)
  BUILD_FRONTEND:
    value: "false"
    description: "Set to 'true' to build frontend image, otherwise fetches latest"
  BUILD_BACKEND:
    value: "false"
    description: "Set to 'true' to build backend image, otherwise fetches latest"
  SEED_DATABASE:
    value: "false"
    description: "Set to 'true' to seed Database from ci cd pipeline"

# ---------------------------------------------------------
# GLOBAL CONFIGURATION
# ---------------------------------------------------------
default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com

# ---------------------------------------------------------
# HIDDEN HELPERS (DRY Configurations)
# ---------------------------------------------------------
.aws_oidc_login:
  script:
    - >
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn arn:aws:iam::${ACCOUNT_ID}:role/GitLabActions-ECS-DeployRole
      --role-session-name "GitLabRunner-${CI_PIPELINE_ID}"
      --web-identity-token ${GITLAB_OIDC_TOKEN}
      --duration-seconds 3600
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
      --output text))

.service_matrix:
  parallel:
    matrix:
      - SERVICE: "frontend"
        BUILD_DIR: "lirw-three-tier/frontend"
        ECR_REPOSITORY: "lirw-ecr-frontend-repo-$ENV_VAR"
        TASK_FAMILY: "lirw-ecr-frontend"
        ECS_SERVICE_NAME: "frontend-service"
        VAR_NAME: "$BUILD_FRONTEND"
      - SERVICE: "backend"
        BUILD_DIR: "lirw-three-tier/backend"
        ECR_REPOSITORY: "lirw-ecr-backend-repo-$ENV_VAR"
        TASK_FAMILY: "lirw-ecr-backend"
        ECS_SERVICE_NAME: "backend-service"
        VAR_NAME: "$BUILD_BACKEND"
      - SERVICE: "seed-database"
        BUILD_DIR: "lirw-three-tier/database-seeder"
        ECR_REPOSITORY: "lirw-ecr-database-seed-repo-$ENV_VAR"
        TASK_FAMILY: "db-seeder-$ENV_VAR"
        VAR_NAME: "$SEED_DATABASE"

# ---------------------------------------------------------
# STAGE DETECT CHANGES
# ---------------------------------------------------------

detect-changes:
  stage: detect
  image: alpine:latest
  rules:
    # 1. If it's a manual UI trigger, DO NOT run this job at all.
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never
    # Run for all other cases (like pushes)
    - when: always
  extends: .service_matrix
  script:
    - apk add --no-cache git
    # Create a unique env file for this specific matrix job
    - touch build-${SERVICE}.env
    - git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA > changed_files.txt
    - |
      # Check if this specific service's directory has changes
      if grep -q "$DIR_PATH" changed_files.txt; then 
        echo "${VAR_NAME}=true" >> build-${SERVICE}.env
        echo "✅ Changes detected in $SERVICE. Setting $VAR_NAME=true"
      else
        echo "No changes in $SERVICE."
      fi
  artifacts:
    reports:
      # GitLab will automatically merge the dotenv files from all 3 matrix jobs
      dotenv: build-${SERVICE}.env
# ---------------------------------------------------------
# HIDDEN HELPER: Setup Build Environment
# ---------------------------------------------------------
.setup_build_env:
  script:
    - apk add --no-cache aws-cli
    # 1. Dynamically evaluate the variable name stored in $VAR_NAME (e.g., $BUILD_FRONTEND)
    - eval export SHOULD_BUILD=\$${VAR_NAME}
    # 2. If the variable is empty (meaning no changes were detected), default it to "false"
    - export SHOULD_BUILD=${SHOULD_BUILD:-false}
# ---------------------------------------------------------
# STAGE 1: BUILD & PUSH
# ---------------------------------------------------------
build_image:
  stage: build
  extends: .service_matrix
  image: docker:24.0.5
  needs:
    - job: detect-changes
      artifacts: true
      optional: true # CRITICAL: Prevents pipeline crash if detect-changes is skipped (e.g., manual UI triggers)
  services:
    - docker:24.0.5-dind
  before_script:
    # By making this purely references, we satisfy the strict array validator
    - !reference [.setup_build_env, script]
    - !reference [.aws_oidc_login, script]

  script:
    - ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

    - |
      if [ "$SHOULD_BUILD" == "true" ]; then
        echo "🏗️ Building Docker Image for $SERVICE..."
        aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
        
        IMAGE_TAG="${CI_COMMIT_SHA}"
        cd $BUILD_DIR
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        
        FINAL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
      else
        echo "🔍 No changes detected. Fetching latest tag from ECR for $SERVICE..."
        FETCHED_TAG=$(aws ecr describe-images --repository-name $ECR_REPOSITORY --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' --output text)
        
        if [ "$FETCHED_TAG" == "None" ] || [ -z "$FETCHED_TAG" ]; then 
          echo "❌ No previous image found in ECR to fallback on." && exit 1
        fi
        
        FINAL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$FETCHED_TAG"
      fi

    - echo "✅ Resolved Image: $FINAL_IMAGE"
    - echo "$FINAL_IMAGE" > $CI_PROJECT_DIR/${SERVICE}-image.txt
  artifacts:
    paths:
      - ${SERVICE}-image.txt
# ---------------------------------------------------------
# STAGE 2: PREPARE MANIFESTS
# ---------------------------------------------------------
prepare_manifest:
  stage: prepare
  extends: .service_matrix
  image: alpine:latest
  needs:
    - job: build_image
      artifacts: true
  before_script:
    - apk add --no-cache aws-cli jq
    - !reference [.aws_oidc_login, script]
  script:
    # Read the exact artifact for this specific service
    - FINAL_IMAGE_URI=$(cat ${SERVICE}-image.txt)
    - echo "Updating task definition for $SERVICE using image $FINAL_IMAGE_URI"

    - aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition > task-def.json
    - jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' task-def.json > clean-task-def.json

    # Replace the image URI in the first container definition
    - >
      jq --arg IMAGE "$FINAL_IMAGE_URI" 
      '.containerDefinitions[0].image = $IMAGE' 
      clean-task-def.json > ${SERVICE}-ready-task-def.json

  artifacts:
    paths:
      - ${SERVICE}-ready-task-def.json
    expire_in: 1 hour

# ---------------------------------------------------------
# STAGE 3: DEPLOY
# ---------------------------------------------------------
deploy_ecs:
  stage: deploy
  extends: .service_matrix
  image: alpine:latest
  rules:
    # 1. Target ONLY the frontend and backend matrix instances (Ignore the seeder)
    - if: '$SERVICE == "frontend" || $SERVICE == "backend"'
  needs:
    - job: prepare_manifest
      artifacts: true
  before_script:
    - apk add --no-cache aws-cli
    - !reference [.aws_oidc_login, script]
  script:
    - echo "Registering new ECS task definition for $SERVICE..."
    - >
      REVISION_ARN=$(aws ecs register-task-definition 
      --cli-input-json file://${SERVICE}-ready-task-def.json 
      --query 'taskDefinition.taskDefinitionArn' --output text)

    - echo "Created revision $REVISION_ARN"

    - echo "Deploying to ECS cluster..."
    - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_NAME --task-definition $REVISION_ARN > /dev/null

    - echo "Waiting for service to stabilize..."
    - aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE_NAME
    - echo "✅ Deployment Successful!"

seed-database:
  stage: seed
  image: alpine:latest
  extends: .service_matrix
  needs:
    - job: prepare_manifest
      artifacts: true
  rules:
    # 1. Target ONLY the database-seeder matrix instance
    # 2. ONLY run if the $SEED_DATABASE variable evaluated to "true"
    - if: '$SERVICE == "database-seeder" && $SEED_DATABASE == "true"'
  before_script:
    - apk add --no-cache aws-cli
    - !reference [.aws_oidc_login, script]
  script:
    - echo "Registering new ECS task definition for $SERVICE..."
    - >
      NEW_TASK_ARN=$(aws ecs register-task-definition 
      --cli-input-json file://${SERVICE}-ready-task-def.json 
      --query 'taskDefinition.taskDefinitionArn' --output text)

    - echo "Starting DB Seeding Task with ARN: $NEW_TASK_ARN..."
    - TASK_ARN=$(aws ecs run-task --cluster $ECS_CLUSTER --task-definition $NEW_TASK_ARN --launch-type EC2 --query "tasks[0].taskArn" --output text)

    - echo "Waiting for task to stop..."
    - aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks $TASK_ARN

    - EXIT_CODE=$(aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $TASK_ARN --query "tasks[0].containers[0].exitCode" --output text)
    - |
      if [ "$EXIT_CODE" -eq "0" ]; then 
        echo "✅ Seeding Success"
      else 
        echo "❌ Seeding Failed" && exit 1
      fi
